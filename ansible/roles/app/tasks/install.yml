---
- name: Install system packages
  ansible.builtin.apt:
    name:
      - python3
      - curl
      - git
    state: present
    update_cache: true

- name: Install uv
  become_user: "{{ app_user }}"
  ansible.builtin.shell:
    cmd: curl -LsSf https://astral.sh/uv/install.sh | sh
    creates: "/home/{{ app_user }}/.local/bin/uv"
